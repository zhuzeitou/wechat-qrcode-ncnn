name: CI - Windows

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msvc_arch: x64
          - arch: x86
            msvc_arch: amd64_x86
          - arch: arm64
            msvc_arch: amd64_arm64

    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up MSVC Dev Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Configure
        run: cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

      - name: Install
        run: cmake --install build --prefix ./install_output

      - name: Verify artifacts
        run: |
          Write-Host "Checking install output..."
          Get-ChildItem install_output/bin/
          if (Test-Path install_output/bin/zzt_qrcode.dll) {
            Write-Host "✅ zzt_qrcode.dll found"
          } else {
            Write-Error "❌ zzt_qrcode.dll not found"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ matrix.arch }}
          path: install_output/
