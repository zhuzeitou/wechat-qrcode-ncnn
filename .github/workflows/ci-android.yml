name: CI - Android

on: [push, pull_request]

jobs:
  build:
    name: Android (all ABIs)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Build arm64-v8a
        run: |
          cmake -B build-arm64-v8a -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-arm64-v8a -j$(nproc)
          cmake --install build-arm64-v8a --prefix ./install_android/arm64-v8a

      - name: Build armeabi-v7a
        run: |
          cmake -B build-armeabi-v7a -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_ARM_NEON=ON \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-armeabi-v7a -j$(nproc)
          cmake --install build-armeabi-v7a --prefix ./install_android/armeabi-v7a

      - name: Build x86
        run: |
          cmake -B build-x86 -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86 \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-x86 -j$(nproc)
          cmake --install build-x86 --prefix ./install_android/x86

      - name: Build x86_64
        run: |
          cmake -B build-x86_64 -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-x86_64 -j$(nproc)
          cmake --install build-x86_64 --prefix ./install_android/x86_64

      - name: Verify artifacts
        run: |
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            echo "Checking $abi..."
            ls -la install_android/$abi/lib/
            test -f install_android/$abi/lib/libzzt_qrcode.so
            echo "✅ $abi: libzzt_qrcode.so found"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-all-abis
          path: install_android/
