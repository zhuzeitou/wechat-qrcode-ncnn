name: CI - Android Gradle

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        module: [zzt_qrcode_kotlin, zzt_qrcode_java]

    name: Android AAR (${{ matrix.module }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build AAR
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :${{ matrix.module }}:assembleRelease

      - name: Verify artifacts
        run: |
          echo "Checking ${{ matrix.module }} AAR..."
          aar=$(find android/${{ matrix.module }}/build -name "*.aar" | head -1)
          if [ -n "$aar" ]; then
            echo "✅ AAR found: $aar"
          else
            echo "❌ AAR not found"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aar-${{ matrix.module }}
          path: android/${{ matrix.module }}/build/outputs/aar/*.aar
